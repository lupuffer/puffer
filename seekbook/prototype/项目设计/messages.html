<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消息中心 - 星辰书链</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 0;
            height: calc(100vh - 64px - 48px);
            min-height: 0;
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            overflow: hidden;
        }

        .chat-sidebar {
            background: var(--gray-50);
            border-right: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
        }

        .chat-sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--gray-200);
        }

        .chat-sidebar-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-800);
            margin: 0;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }

        .demo-reset-wrap {
            padding: 12px 16px;
            border-top: 1px solid var(--gray-200);
            background: white;
        }

        .demo-reset-btn {
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--gray-600);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .demo-reset-btn:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
            background: var(--light-blue);
        }

        .conversation {
            display: flex;
            gap: 12px;
            padding: 16px 20px;
            border-bottom: 1px solid var(--gray-100);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .conversation:hover,
        .conversation.active {
            background: var(--light-blue);
        }

        .conversation-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue) 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            font-size: 20px;
        }

        .conversation-info {
            flex: 1;
            min-width: 0;
        }

        .conversation-name {
            font-weight: 600;
            font-size: 14px;
            color: var(--gray-800);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .conversation-time {
            font-size: 12px;
            color: var(--gray-400);
            font-weight: normal;
        }

        .conversation-preview {
            font-size: 13px;
            color: var(--gray-500);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .unread-badge {
            background: #ef4444;
            color: white;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }

        .chat-main {
            display: flex;
            flex-direction: column;
            background: white;
            min-width: 0;
            min-height: 0;
            height: 100%;
        }

        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue) 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .chat-header-name {
            font-weight: 600;
            color: var(--gray-800);
        }

        .chat-header-status {
            font-size: 13px;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
        }

        .chat-actions {
            display: flex;
            gap: 8px;
        }

        .chat-action-btn {
            width: 36px;
            height: 36px;
            background: var(--gray-100);
            border-radius: 8px;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-action-btn:hover {
            background: var(--gray-200);
            color: var(--gray-800);
        }

        .order-state-card {
            position: sticky;
            top: 0;
            z-index: 6;
            margin: 12px 24px 0;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--gray-200);
            background: white;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .order-state-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .order-state-title {
            font-size: 12px;
            color: var(--gray-500);
        }

        .order-state-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--gray-900);
        }

        .order-state-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .state-action {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--gray-200);
            background: white;
            color: var(--gray-700);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
        }

        .state-action:hover {
            border-color: var(--primary-blue);
            color: var(--primary-blue);
            background: var(--light-blue);
        }

        .state-action.primary {
            background: var(--primary-blue);
            border-color: var(--primary-blue);
            color: white;
        }

        .state-action.primary:hover {
            background: var(--primary-blue-dark);
            color: white;
        }

        .state-action.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .chat-messages {
            flex: 1 1 auto;
            min-height: 0;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--gray-50);
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 72%;
        }

        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-blue) 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
            font-size: 14px;
        }

        .message.sent .message-avatar {
            background: var(--gray-400);
        }

        .message-content {
            background: white;
            padding: 12px 16px;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        .message.sent .message-content {
            background: var(--primary-blue);
            color: white;
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-time {
            font-size: 11px;
            color: var(--gray-400);
            margin-top: 4px;
        }

        .message.sent .message-time {
            color: rgba(255, 255, 255, 0.75);
        }

        .chat-input-area {
            flex: 0 0 auto;
            padding: 16px 24px;
            border-top: 1px solid var(--gray-200);
            background: white;
        }

        .chat-toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .toolbar-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            color: var(--gray-500);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .toolbar-btn:hover {
            background: var(--gray-100);
            color: var(--primary-blue);
        }

        .chat-input-wrapper {
            display: flex;
            gap: 12px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }

        .send-btn {
            padding: 12px 24px;
            background: var(--primary-blue);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            user-select: none;
        }

        .send-btn:hover {
            background: var(--primary-blue-dark);
        }

        @media (max-width: 900px) {
            .chat-container {
                grid-template-columns: 1fr;
            }

            .chat-sidebar {
                display: none;
            }

            .message {
                max-width: 88%;
            }

            .order-state-card {
                margin: 10px 16px 0;
            }

            .chat-messages {
                padding: 16px;
            }

            .chat-input-area {
                padding: 14px 16px;
            }
        }
    </style>
</head>

            <div class="chat-container">

                        <div class="conversation" onclick="selectConversation(this, 2)">
                            <div class="conversation-avatar"><i class="fas fa-user"></i></div>

        <script>
        const ORDER_STATES = {
            COMMUNICATING: "待沟通",
            PENDING_DELIVERY: "待交付",
            PENDING_FINISH: "待完成",
            COMPLETED: "已完成",
            CANCELED: "已取消"
        };

        const SCENARIOS = {
            1: {
                id: 1,
                name: "张同学",
                role: "seller",
                statusKey: "status_Zhang",
                preview: "学长你好，我对你发布的《高等数学》很感兴趣，请问书还在吗？",
                initialMessages: [
                    { type: "received", text: "学长你好，我对你发布的《高等数学》很感兴趣，请问书还在吗？", time: "10:25" }
                ],
                replies: {
                    [ORDER_STATES.COMMUNICATING]: "太好了，我确认要了，请修改状态。",
                    [ORDER_STATES.PENDING_DELIVERY]: "收到，我等你交付，辛苦了！",
                    [ORDER_STATES.PENDING_FINISH]: "我已经收到书了，马上点击完成订单。"
                }
            },
            2: {
                id: 2,
                name: "李同学",
                role: "buyer",
                statusKey: "status_Li",
                preview: "在的，九成新。",
                initialMessages: [
                    { type: "sent", text: "同学你好，你的《数据结构》还在吗？", time: "10:20" },
                    { type: "received", text: "在的，九成新。", time: "10:21" }
                ],
                replies: {
                    [ORDER_STATES.COMMUNICATING]: "好的，我已经看到你确认了，一会儿图书馆见。",
                    [ORDER_STATES.PENDING_DELIVERY]: "我这边已经准备好书了，马上过去。",
                    [ORDER_STATES.PENDING_FINISH]: "书已经交到你手上了，麻烦点完成订单。"
                }
            },
            3: {
                id: 3,
                name: "王同学",
                role: "seller",
                statusKey: "status_Wang",
                preview: "谢谢，书已收到，状态很好！",
                initialMessages: [
                    { type: "received", text: "谢谢，书已收到，状态很好！", time: "09:10" }
                ],
                replies: {
                    [ORDER_STATES.COMMUNICATING]: "好的，我们按流程来。",
                    [ORDER_STATES.PENDING_DELIVERY]: "我会尽快交付。",
                    [ORDER_STATES.PENDING_FINISH]: "请确认完成。"
                }
            },
            4: {
                id: 4,
                name: "赵同学",
                role: "buyer",
                statusKey: "status_Zhao",
                preview: "请问可以便宜一点吗？",
                initialMessages: [
                    { type: "received", text: "请问可以便宜一点吗？", time: "08:40" }
                ],
                replies: {
                    [ORDER_STATES.COMMUNICATING]: "可以再商量一下价格吗？",
                    [ORDER_STATES.PENDING_DELIVERY]: "我这边会尽快确认收货。",
                    [ORDER_STATES.PENDING_FINISH]: "收到后我会点完成。"
                }
            }
        };

        let currentScenario = SCENARIOS[1];

        function getCurrentScenario() {
            return currentScenario;
        }

        function getOrderState() {
            const scenario = getCurrentScenario();
            const saved = localStorage.getItem(scenario.statusKey);
            return saved || ORDER_STATES.COMMUNICATING;
        }

        function setOrderState(nextState) {
            const scenario = getCurrentScenario();
            localStorage.setItem(scenario.statusKey, nextState);
            renderOrderStateCard();
        }

        function escapeHtml(raw) {
            const div = document.createElement("div");
            div.textContent = raw;
            return div.innerHTML;
        }

        function getCurrentTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, "0");
            const mm = String(now.getMinutes()).padStart(2, "0");
            return hh + ":" + mm;
        }

        function scrollMessagesToBottom() {
            const container = document.getElementById("chatMessages");
            container.scrollTop = container.scrollHeight;
        }

        function renderMessages(messages) {
            const container = document.getElementById("chatMessages");
            const html = messages.map((msg) => {
                const cls = msg.type === "sent" ? "message sent" : "message";
                return [
                    '<div class="' + cls + '">',
                    '  <div class="message-avatar"><i class="fas fa-user"></i></div>',
                    '  <div class="message-content">',
                    '    <div class="message-text">' + escapeHtml(msg.text) + "</div>",
                    '    <div class="message-time">' + (msg.time || getCurrentTime()) + "</div>",
                    "  </div>",
                    "</div>"
                ].join("");
            }).join("");
            container.innerHTML = html;
            scrollMessagesToBottom();
        }

        function appendMessage(type, text) {
            const container = document.getElementById("chatMessages");
            const cls = type === "sent" ? "message sent" : "message";
            const html = [
                '<div class="' + cls + '">',
                '  <div class="message-avatar"><i class="fas fa-user"></i></div>',
                '  <div class="message-content">',
                '    <div class="message-text">' + escapeHtml(text) + "</div>",
                '    <div class="message-time">' + getCurrentTime() + "</div>",
                "  </div>",
                "</div>"
            ].join("");
            container.insertAdjacentHTML("beforeend", html);
            scrollMessagesToBottom();
        }

        function appendSystemMessage(text) {
            appendMessage("received", text);
        }

        function getActionConfig(state) {
            if (state === ORDER_STATES.COMMUNICATING) {
                return [
                    { text: "确认订单", primary: true, action: () => setOrderState(ORDER_STATES.PENDING_DELIVERY) },
                    { text: "取消订单", primary: false, action: () => setOrderState(ORDER_STATES.CANCELED) }
                ];
            }

            if (state === ORDER_STATES.PENDING_DELIVERY) {
                return [
                    { text: "交付订单", primary: true, action: () => setOrderState(ORDER_STATES.PENDING_FINISH) },
                    { text: "取消订单", primary: false, action: () => setOrderState(ORDER_STATES.CANCELED) }
                ];
            }

            if (state === ORDER_STATES.PENDING_FINISH) {
                return [{ text: "完成订单", primary: true, action: () => setOrderState(ORDER_STATES.COMPLETED) }];
            }

            if (state === ORDER_STATES.COMPLETED) {
                return [{ text: "去评价", primary: true, action: () => appendSystemMessage("评价入口已打开（模拟）。") }];
            }

            return [];
        }

        function renderOrderStateCard() {
            const state = getOrderState();
            const stateTextEl = document.getElementById("orderStateText");
            const actionsEl = document.getElementById("orderStateActions");

            stateTextEl.textContent = state;
            actionsEl.innerHTML = "";

            if (state === ORDER_STATES.CANCELED) {
                actionsEl.innerHTML = '<span class="order-state-title">交易已关闭</span>';
                return;
            }

            const actions = getActionConfig(state);
            actions.forEach((cfg) => {
                const node = document.createElement("div");
                node.className = "state-action" + (cfg.primary ? " primary" : "");
                node.textContent = cfg.text;
                if (cfg.action) node.addEventListener("click", cfg.action);
                actionsEl.appendChild(node);
            });
        }

        function getAutoReplyByPromise() {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const scenario = getCurrentScenario();
                    const state = getOrderState();
                    resolve(scenario.replies[state] || "好的，收到。");
                }, 1000);
            });
        }

        async function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text) return;

            appendMessage("sent", text);
            input.value = "";
            scrollMessagesToBottom();

            const reply = await getAutoReplyByPromise();
            appendMessage("received", reply);
            scrollMessagesToBottom();
        }

        function selectConversation(element, id) {
            document.querySelectorAll(".conversation").forEach((item) => item.classList.remove("active"));
            element.classList.add("active");

            currentScenario = SCENARIOS[id] || SCENARIOS[1];

            document.querySelector(".chat-header-name").textContent = currentScenario.name;

            const badge = element.querySelector(".unread-badge");
            if (badge) badge.remove();

            renderMessages(currentScenario.initialMessages);
            renderOrderStateCard();
        }

        function resetDemoState() {
            Object.values(SCENARIOS).forEach((scenario) => {
                localStorage.removeItem(scenario.statusKey);
            });
            location.reload();
        }

        document.addEventListener("DOMContentLoaded", () => {
            const zhangPreview = document.querySelector('.conversation[onclick="selectConversation(this, 1)"] .conversation-preview');
            const liPreview = document.querySelector('.conversation[onclick="selectConversation(this, 2)"] .conversation-preview');
            if (zhangPreview) zhangPreview.textContent = SCENARIOS[1].preview;
            if (liPreview) liPreview.textContent = SCENARIOS[2].preview;

            renderMessages(SCENARIOS[1].initialMessages);
            renderOrderStateCard();

            const input = document.getElementById("messageInput");
            input.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
