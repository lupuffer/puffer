
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 星辰书链</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            background: var(--purple-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .login-container {
            width: 100%;
            max-width: 480px;
            padding: var(--space);
        }
        
        .login-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-xl);
            padding: var(--space-xl);
            box-shadow: var(--shadow-xl);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: var(--space-xl);
        }
        
        .login-logo i {
            font-size: 48px;
            color: var(--primary);
        }
        
        .login-logo h1 {
            font-size: var(--font-size-xl);
            color: var(--text-primary);
            margin-top: var(--space);
        }
        
        .login-logo p {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-top: var(--space-sm);
        }
        
        .tabs {
            display: flex;
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
            background: var(--bg-page);
            padding: 4px;
            border-radius: var(--border-radius);
        }
        
        .tab {
            flex: 1;
            padding: var(--space);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: var(--font-size-sm);
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--border-radius-sm);
            transition: all 0.2s;
        }
        
        .tab.active {
            background: var(--bg-card);
            color: var(--primary);
            box-shadow: var(--shadow-sm);
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .zju-login {
            text-align: center;
            padding: var(--space-lg) 0;
        }
        
        .zju-icon {
            width: 80px;
            height: 80px;
            background: var(--blue-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-lg);
            color: #fff;
            font-size: 36px;
        }
        
        .zju-title {
            font-size: var(--font-size-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }
        
        .zju-desc {
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-lg);
        }
        
        .btn-full {
            width: 100%;
        }
        
        .btn-zju {
            background: var(--blue-gradient);
            color: #fff;
        }
        
        .btn-zju:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .link {
            color: var(--primary);
            cursor: pointer;
            text-decoration: none;
        }
        
        .link:hover {
            text-decoration: underline;
        }
        
        .text-center {
            text-align: center;
            margin-top: var(--space);
            font-size: var(--font-size-sm);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <i class="fas fa-book-open"></i>
                <h1>星辰书链</h1>
                <p>浙江大学校园二手书交易平台</p>
            </div>
            
            <div class="tabs">
                <button class="tab active" onclick="switchTab('zju')">浙大认证</button>
                <button class="tab" onclick="switchTab('username')">用户名登录</button>
                <button class="tab" onclick="switchTab('register')">注册</button>
            </div>
            
            <!-- 浙大认证 -->
            <div id="zjuTab" class="tab-content active">
                <div class="zju-login">
                    <div class="zju-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="zju-title">浙江大学在校师生</div>
                    <div class="zju-desc">使用浙大统一身份认证，享受完整功能</div>
                    <button class="btn btn-zju btn-full" onclick="loginZju()">
                        <i class="fas fa-sign-in-alt"></i> 浙大统一认证登录
                    </button>
                    <button class="btn btn-secondary btn-full" onclick="location.href='index.html'" style="margin-top: var(--space-sm);">
                        先逛逛，暂不登录
                    </button>
                </div>
            </div>
            
            <!-- 用户名登录 -->
            <div id="usernameTab" class="tab-content">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="loginUsername" placeholder="请输入用户名">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码">
                </div>
                <div id="loginError" class="text-danger mb-3" style="font-size: var(--font-size-xs);"></div>
                <button class="btn btn-primary btn-full" onclick="loginUsername()">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                <div class="text-center">
                    还没有账号？<span class="link" onclick="switchTab('register')">立即注册</span>
                </div>
            </div>
            
            <!-- 注册（自我注册，无需邮箱验证） -->
            <div id="registerTab" class="tab-content">
                <div class="form-group">
                    <label class="form-label">昵称</label>
                    <input type="text" class="form-input" id="regName" placeholder="请输入昵称">
                </div>
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="regUsername" placeholder="请输入用户名（用于登录）">
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="regPassword" placeholder="请输入密码（6位以上）">
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <input type="password" class="form-input" id="regPasswordConfirm" placeholder="请再次输入密码">
                </div>
                <div id="regError" class="text-danger mb-3" style="font-size: var(--font-size-xs);"></div>
                <button class="btn btn-primary btn-full" onclick="register()">
                    <i class="fas fa-user-plus"></i> 立即注册
                </button>
                <div class="text-center" style="margin-top: var(--space);">
                    已有账号？<span class="link" onclick="switchTab('username')">直接登录</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        // 切换标签
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            
            if (tab === 'zju') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('zjuTab').classList.add('active');
            } else if (tab === 'username') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('usernameTab').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('registerTab').classList.add('active');
            }
        }
        
        // 浙大登录
        function loginZju() {
            const result = QS.Auth.loginZju();
            if (result.success) {
                alert('登录成功！欢迎 ' + result.user.name);
                location.href = 'index.html';
            }
        }
        
        // 用户名登录
        function loginUsername() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                document.getElementById('loginError').textContent = '请填写完整信息';
                return;
            }
            
            const result = QS.Auth.login(username, password);
            if (result.success) {
                alert('登录成功！欢迎 ' + result.user.name);
                location.href = 'index.html';
            } else {
                document.getElementById('loginError').textContent = result.message;
            }
        }
        
        // 注册（自我注册，无需邮箱验证）
        function register() {
            const name = document.getElementById('regName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            
            if (!name || !username || !password || !passwordConfirm) {
                document.getElementById('regError').textContent = '请填写完整信息';
                return;
            }
            
            if (password.length < 6) {
                document.getElementById('regError').textContent = '密码至少6位';
                return;
            }
            
            if (password !== passwordConfirm) {
                document.getElementById('regError').textContent = '两次输入的密码不一致';
                return;
            }
            
            // 使用用户名作为唯一标识存储
            const result = QS.Auth.register({ 
                name: name, 
                email: username, 
                password: password 
            });
            
            if (result.success) {
                alert('注册成功！请使用用户名登录');
                switchTab('username');
                // 清空表单
                document.getElementById('regName').value = '';
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regPasswordConfirm').value = '';
            } else {
                document.getElementById('regError').textContent = result.message;
            }
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            QS.DataStore.init();
        });
    </script>
</body>
</html>
