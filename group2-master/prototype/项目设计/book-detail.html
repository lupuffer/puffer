<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情 - 星辰书链</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .detail-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 32px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }
        
        .book-image-large {
            width: 100%;
            height: 400px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .book-image-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .book-detail-info h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #1e293b;
        }
        
        .detail-meta {
            display: flex;
            gap: 24px;
            margin-bottom: 16px;
            color: #64748b;
            font-size: 14px;
        }
        
        .detail-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .detail-price {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin: 24px 0;
        }
        
        .detail-price .current {
            font-size: 36px;
            font-weight: 700;
            color: #ef4444;
        }
        
        .detail-price .original {
            font-size: 18px;
            color: #94a3b8;
            text-decoration: line-through;
        }
        
        .detail-tags {
            display: flex;
            gap: 12px;
            margin: 16px 0;
        }
        
        .detail-tag {
            padding: 6px 14px;
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .detail-desc {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        .detail-desc p {
            margin-bottom: 12px;
            font-size: 14px;
            color: #475569;
        }
        
        .detail-desc strong {
            color: #1e293b;
            font-weight: 600;
        }
        
        .action-btns {
            display: flex;
            gap: 16px;
            margin-top: 24px;
        }
        
        .action-btns .btn {
            padding: 14px 32px;
            font-size: 15px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .action-btns .btn-primary {
            background: #0369a1;
            color: white;
        }
        
        .action-btns .btn-outline {
            background: white;
            color: #475569;
            border: 2px solid #e2e8f0;
        }
        
        .seller-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-top: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        
        .seller-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .seller-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0369a1 0%, #3b82f6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
        }
        
        .seller-info h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        
        .seller-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: #f59e0b;
            font-size: 14px;
            font-weight: 500;
        }
        
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            gap: 16px;
            color: #64748b;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #e2e8f0;
            border-top-color: #0369a1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .error-container {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }
        
        .error-container i {
            font-size: 64px;
            color: #ef4444;
            margin-bottom: 16px;
        }
        
        @media (max-width: 768px) {
            .detail-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="layout-sidebar">
    <div class="sidebar">
        <div class="sidebar-brand">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <span>星辰书链</span>
            </div>
        </div>
        <div class="sidebar-nav">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i><span>首页</span></a>
            <a href="buy.html" class="nav-link active"><i class="fas fa-shopping-cart"></i><span>我要买书</span></a>
            <a href="sell.html" class="nav-link"><i class="fas fa-tag"></i><span>我要卖书</span></a>
            <a href="knowledge.html" class="nav-link"><i class="fas fa-graduation-cap"></i><span>知识遗产社区</span></a>
            <a href="messages.html" class="nav-link"><i class="fas fa-comments"></i><span>消息中心</span></a>
            <a href="profile.html" class="nav-link"><i class="fas fa-user"></i><span>个人中心</span></a>
        </div>
        <div class="sidebar-user">
            <div class="user-info">
                <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                <div class="user-details">
                    <span class="user-name">请登录</span>
                    <span class="user-badge"><i class="fas fa-check-circle"></i> 浙大认证</span>
                </div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="content-header">
            <div class="header-left">
                <h1 class="page-title">书籍详情</h1>
            </div>
            <div class="header-right">
                <div class="header-btn btn-notification"><i class="fas fa-bell"></i><span class="notification-dot"></span></div>
                <div class="header-btn btn-publish" onclick="location.href='publish-sell.html'"><i class="fas fa-plus"></i><span>发布卖书</span></div>
            </div>
        </div>

        <div class="content-body" style="padding: 0;">
            <div id="detailContent"></div>
        </div>

        <div class="footer">
            <div class="container">
                <div class="footer-content">
                    <div class="footer-section"><h3>星辰书链</h3><p>浙江大学校园学术资源交易平台</p></div>
                    <div class="footer-section"><h3>快速链接</h3><a href="#">关于我们</a><a href="#">使用条款</a><a href="#">隐私政策</a><a href="#">帮助中心</a></div>
                    <div class="footer-section"><h3>联系我们</h3><p><i class="fas fa-envelope"></i> support@qiushu.zju.edu.cn</p></div>
                </div>
                <div class="footer-bottom"><p>© 2023 求书平台 - 浙江大学创新创业项目</p></div>
            </div>
        </div>
    </div>

    <script>
        // 从 URL 获取书籍 ID
        function getBookIdFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return parseInt(params.get('id')) || 0;
        }
        
        // Promise 加载书籍详情
        async function loadBookDetail() {
            const bookId = getBookIdFromUrl();
            const container = document.getElementById('detailContent');
            
            if (!bookId) {
                container.innerHTML = '<div class="error-container"><i class="fas fa-exclamation-circle"></i><h3>未找到书籍</h3></div>';
                return;
            }
            
            container.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div><p>正在加载...</p></div>';
            
            try {
                // 使用 Promise (fetch) 加载本地文件
                const response = await fetch('./data/data.json');
                if (!response.ok) throw new Error('加载失败');
                
                const data = await response.json();
                const book = data.find(item => item.id === bookId);
                
                if (book) {
                    renderBook(book);
                } else {
                    // 未找到，使用默认数据
                    renderBook({
                        id: bookId,
                        name: `商品 #${bookId}`,
                        price: parseFloat((Math.random() * 200 + 10).toFixed(2)),
                        img: `./images/book${((bookId % 6) + 1)}.jpg`
                    });
                }
            } catch (error) {
                console.error('加载失败:', error);
                // 使用备用数据
                renderBook({
                    id: bookId,
                    name: `商品 #${bookId}`,
                    price: parseFloat((Math.random() * 200 + 10).toFixed(2)),
                    img: `./images/book${((bookId % 6) + 1)}.jpg`
                });
            }
        }
        
        // 渲染书籍
        function renderBook(book) {
            const conditions = ['全新', '九成新', '良好', '一般'];
            const campuses = ['紫金港', '玉泉', '西溪', '华家池'];
            const condition = conditions[book.id % 4];
            const campus = campuses[book.id % 4];
            const hasNotes = book.id % 3 === 0;
            const sellerName = ['张同学', '李同学', '王同学', '赵同学'][book.id % 4];
            const originalPrice = (book.price * 1.5).toFixed(2);
            
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-container">
                    <div>
                        <div class="book-image-large">
                            <img src="${book.img}" alt="${book.name}" onerror="this.src='./images/book1.jpg'">
                        </div>
                    </div>
                    <div class="book-detail-info">
                        <h1>${book.name}</h1>
                        <div class="detail-meta">
                            <span><i class="fas fa-user"></i> 作者${(book.id % 10) + 1}</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${campus}</span>
                            <span><i class="fas fa-clock"></i> ${book.id % 30 + 1}天前</span>
                        </div>
                        <div class="detail-tags">
                            <span class="detail-tag">${condition}</span>
                            ${hasNotes ? '<span class="detail-tag">有笔记</span>' : ''}
                        </div>
                        <div class="detail-price">
                            <span class="current">¥${book.price.toFixed(2)}</span>
                            <span class="original">¥${originalPrice}</span>
                        </div>
                        <div class="detail-desc">
                            <p><strong>ISBN：</strong>9787${1000000000 + book.id}</p>
                            <p><strong>品相：</strong>${condition}</p>
                            <p><strong>笔记：</strong>${hasNotes ? '有笔记' : '无笔记'}</p>
                            <p><strong>交易方式：</strong>当面交易 / 邮寄</p>
                        </div>
                        <div class="action-btns">
                            <div class="btn btn-primary" onclick="location.href='messages.html'"><i class="fas fa-comments"></i> 联系卖家</div>
                            <div class="btn btn-outline" onclick="alert('已收藏')"><i class="fas fa-heart"></i> 收藏</div>
                        </div>
                        <div class="seller-card">
                            <div class="seller-header">
                                <div class="seller-avatar"><i class="fas fa-user"></i></div>
                                <div class="seller-info">
                                    <h3>${sellerName}</h3>
                                    <p><span class="seller-badge"><i class="fas fa-star"></i> 信誉 ${90 + (book.id % 10)}</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', loadBookDetail);
    </script>
</body>
</html>
